<form id="asana-credentials-form">
  <h3>Asana API Zugangsdaten</h3>
  <label for="asana_access_token">Access Token:</label>
  <input type="password" id="asana_access_token" name="asana_access_token" required><br>
  <label for="workspace_gid">Workspace GID:</label>
  <input type="text" id="workspace_gid" name="workspace_gid"><br>
  <label for="project_gid">Project GID:</label>
  <input type="text" id="project_gid" name="project_gid"><br>
  <button type="submit">Speichern</button>
  <div id="asana-credentials-status"></div>
</form>
<script>
document.getElementById('asana-credentials-form').onsubmit = async function(e) {
  e.preventDefault();
  const data = {
    connector_type: 'asana',
    namespace: 'private',
    config: {
      access_token: document.getElementById('asana_access_token').value,
      workspace_gid: document.getElementById('workspace_gid').value,
      project_gid: document.getElementById('project_gid').value
    }
  };
  const resp = await fetch('/connectors/asana', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-API-Key': window.JARVIS_API_KEY || ''
    },
    body: JSON.stringify(data)
  });
  const result = await resp.json();
  document.getElementById('asana-credentials-status').innerText = result.success ? 'Gespeichert!' : (result.error || 'Fehler');
};
</script>
