openapi: 3.0.0
info:
  title: Jarvis Task API
  version: 1.0.0
  description: API for Task Trigger and Status
paths:
  /tasks:
    get:
      summary: List all tasks
      responses:
        '200':
          description: List of tasks
  /tasks/{task_id}:
    get:
      summary: Get task by ID
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Task details
        '404':
          description: Task not found
  /tasks/{task_id}/trigger:
    post:
      summary: Trigger task by ID
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Task triggered
        '404':
          description: Task not found
  /status:
    get:
      summary: Get API status
      responses:
        '200':
          description: API health and active tasks
